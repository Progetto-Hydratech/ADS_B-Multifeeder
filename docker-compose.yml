services:
  fr24feed:
    image: ghcr.io/sdr-enthusiasts/docker-flightradar24:latest
    container_name: multifeeder-fr24
    restart: unless-stopped
    environment:
      BEASTHOST: ${BEASTHOST}
      BEASTPORT: ${BEASTPORT:-30005}
      FR24KEY: ${FR24_KEY}
      TZ: ${TZ:-Europe/Rome}

  piaware:
    image: ghcr.io/sdr-enthusiasts/docker-piaware:latest
    container_name: multifeeder-piaware
    restart: unless-stopped
    environment:
      BEASTHOST: ${BEASTHOST}
      BEASTPORT: ${BEASTPORT:-30005}
      RECEIVER_TYPE: relay
      FEEDER_ID: ${FLIGHTAWARE_FEEDER_ID:-}
      TZ: ${TZ:-Europe/Rome}

  adsbexchange:
    image: ghcr.io/sdr-enthusiasts/docker-adsbexchange:latest
    container_name: multifeeder-adsbx
    restart: unless-stopped
    environment:
      BEASTHOST: ${BEASTHOST}
      BEASTPORT: ${BEASTPORT:-30005}
      UUID: ${ADSBX_UUID}
      SITENAME: ${ADSBX_SITENAME:-MyFeeder}
      LAT: ${LAT}
      LONG: ${LONG}
      ALT: ${ALT}
      TZ: ${TZ:-Europe/Rome}
